name: Compile Polytoria Custom Client
on: [workflow_dispatch]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Polytoria Source
        uses: actions/checkout@v4

      - name: Setup .NET SDK Framework
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot Engine (.NET Edition)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          use-dotnet: true
          include-templates: true

      - name: Inject Official Production API Endpoints
        run: |
          echo "Setting engine configurations to official network lines..."
          echo "GLOBAL_API_ENDPOINT=https://api.polytoria.com/v1" >> $GITHUB_ENV
          echo "GLOBAL_CHAT_ENDPOINT=wss://chat.polytoria.com" >> $GITHUB_ENV

      - name: Pre-Compile C# Project Solutions
        run: |
          echo "Booting Godot to generate cache and Mono bindings..."
          godot --headless --build-solutions --quit || true
          
          echo "Hunting down the generated solution file..."
          SOLUTION=$(find . -name "*.sln" | head -n 1)
          if [ -n "$SOLUTION" ]; then
            echo "Found solution at $SOLUTION, building now..."
            dotnet restore "$SOLUTION"
            dotnet build "$SOLUTION"
          else
            echo "No solution file found. Assuming Godot handled it natively."
          fi

      - name: Compile Standalone Android Client APK
        run: |
          mkdir -p build/android
          godot --headless --export-release "Android" build/android/PolytoriaLiveClient.apk

      - name: Package and Upload Client Build
        uses: actions/upload-artifact@v4
        with:
          name: Polytoria-Official-Network-Build
          path: |
            **/*.apk
